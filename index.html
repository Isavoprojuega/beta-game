```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BETA GAME</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

/* pantalla inicio */

#startScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:60px;
cursor:pointer;
letter-spacing:5px;
z-index:10;
transition:opacity 1s;
}

/* glitch */

.glitch{
animation:glitch 1s infinite;
}

@keyframes glitch{
0%{text-shadow:3px 3px red,-3px -3px blue;}
25%{text-shadow:-3px 3px red,3px -3px blue;}
50%{text-shadow:3px -3px red,-3px 3px blue;}
75%{text-shadow:-3px -3px red,3px 3px blue;}
100%{text-shadow:3px 3px red,-3px -3px blue;}
}

/* menu */

#menu{
position:fixed;
width:100%;
height:100%;
background:url("menu.png");
background-size:cover;
background-position:center;
display:none;
}

/* botones invisibles */

.boton{
position:absolute;
cursor:pointer;
}

/* hover oscuro */

.boton::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0);
transition:background 0.2s;
}

.boton:hover::after{
background:rgba(0,0,0,0.3);
}

.presionado{
transform:scale(0.9);
}

/* posiciones */

#botonJuega{
left:40%;
top:60%;
width:200px;
height:80px;
}

#botonMuere{
left:55%;
top:60%;
width:200px;
height:80px;
}

/* video */

#videoMuere{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:none;
z-index:20;
}

</style>
</head>

<body>

<div id="startScreen">
<div class="glitch">CLICK PARA EMPEZAR</div>
</div>

<div id="menu">

<div id="botonJuega" class="boton"></div>
<div id="botonMuere" class="boton"></div>

</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<video id="videoMuere">
<source src="muere.mp4" type="video/mp4">
</video>

<script>

let startScreen = document.getElementById("startScreen");
let menu = document.getElementById("menu");
let audio = document.getElementById("musica");

let botonJuega = document.getElementById("botonJuega");
let botonMuere = document.getElementById("botonMuere");

let videoMuere = document.getElementById("videoMuere");

/* iniciar juego */

startScreen.addEventListener("click",function(){

startScreen.style.opacity="0";

setTimeout(function(){
startScreen.style.display="none";
menu.style.display="block";
},1000);

audio.volume=0;
audio.play();

let subir=setInterval(function(){

if(audio.volume<1){
audio.volume+=0.05;
}else{
clearInterval(subir);
}

},200);

});

/* juega */

botonJuega.addEventListener("click",function(){

botonJuega.classList.add("presionado");

setTimeout(function(){
alert("Aquí empezaría el juego");
},150);

});

/* muere */

botonMuere.addEventListener("click",function(){

botonMuere.classList.add("presionado");

/* detener música */
audio.pause();
audio.currentTime = 0;

menu.style.display="none";

videoMuere.style.display="block";

videoMuere.play();

});

</script>

</body>
</html>
