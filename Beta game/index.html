<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BETA GAME</title>

<!-- Google Font Retro -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
font-family:'Press Start 2P', monospace;
}

/* Pantalla inicio */
#startScreen{
position:absolute;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
cursor:pointer;
z-index:10;
letter-spacing:3px;
transition:opacity 1s;
text-shadow:0 0 10px white;
}

/* Glitch */
.glitch{
animation:glitch 1s infinite;
}

@keyframes glitch{
0%{ text-shadow: 2px 2px red, -2px -2px blue; }
50%{ text-shadow: -2px 2px red, 2px -2px blue; }
100%{ text-shadow: 2px 2px red, -2px -2px blue; }
}

/* Juego */
#game{
display:none;
opacity:0;
width:100%;
height:100%;
background-image:url("fondo.webp");
background-size:cover;
background-position:center;
justify-content:center;
align-items:center;
flex-direction:column;
transition:opacity 1s;
}

.overlay{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:15px;
text-align:center;
}

/* Título */
h1{
font-size:28px;
color:white;
text-shadow:0 0 15px white;
}

/* Botones */
button{
margin:20px;
padding:15px 30px;
font-size:12px;
cursor:pointer;
transition:0.2s;
font-family:'Press Start 2P', monospace;
border:none;
border-radius:8px;
}

.juega{
background:#00ff55;
color:white;
box-shadow:0 0 15px #00ff55;
}

.muere{
background:#ff0033;
color:white;
box-shadow:0 0 15px #ff0033;
}

button:hover{
transform:scale(1.1);
}

/* Game Over */
#gameOver{
display:none;
font-size:18px;
color:red;
margin-top:20px;
animation:blink 0.5s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}
</style>
</head>

<body>

<div id="startScreen">
<div class="glitch">CLICK PARA ENTRAR</div>
</div>

<div id="game">
<div class="overlay">
<h1>BETA GAME</h1>

<button class="juega">JUEGA</button>
<button class="muere">MUERE</button>

<div id="gameOver">GAME OVER</div>
</div>
</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
let startScreen = document.getElementById("startScreen");
let game = document.getElementById("game");
let audio = document.getElementById("musica");
let gameOver = document.getElementById("gameOver");

startScreen.addEventListener("click", function(){

startScreen.style.opacity = "0";

setTimeout(function(){
startScreen.style.display = "none";
game.style.display = "flex";
game.style.opacity = "1";
},1000);

audio.volume = 0;
audio.play();

let subir = setInterval(function(){
if(audio.volume < 1){
audio.volume += 0.05;
}else{
clearInterval(subir);
}
},200);

});

document.querySelector(".juega").addEventListener("click", function(){
gameOver.style.display="none";
});

document.querySelector(".muere").addEventListener("click", function(){
gameOver.style.display="block";
});
</script>

</body>
</html>
